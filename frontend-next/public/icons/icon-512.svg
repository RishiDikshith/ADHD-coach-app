<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#050a18"/>
    </linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="40%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow behind brain -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow)" filter="url(#neonGlow)"/>
  <!-- Brain icon -->
  <g fill="none" stroke="url(#brain)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M256 130c-58 0-106 43-106 96 0 22 8 42 22 57-8 11-12 23-12 36 0 22 13 40 32 48-5 8-8 17-8 27 0 22 18 39 41 39 9 0 18-3 25-8"/>
    <!-- Right hemisphere -->
    <path d="M256 130c58 0 106 43 106 96 0 22-8 42-22 57 8 11 12 23 12 36 0 22-13 40-32 48 5 8 8 17 8 27 0 22-18 39-41 39-9 0-18-3-25-8"/>
    <!-- Center line -->
    <path d="M256 130v224"/>
    <!-- Neural connections -->
    <path d="M196 180c0 0 30 16 60 0" opacity="0.5"/>
    <path d="M316 180c0 0-30 16-60 0" opacity="0.5"/>
    <path d="M206 228c0 0 25 14 50 0" opacity="0.4"/>
    <path d="M306 228c0 0-25 14-50 0" opacity="0.4"/>
    <path d="M186 270c0 0 35 12 70 0" opacity="0.3"/>
    <path d="M326 270c0 0-35 12-70 0" opacity="0.3"/>
    <!-- Neural nodes -->
    <circle cx="196" cy="214" r="5" fill="#6ee7b7" opacity="0.8"/>
    <circle cx="316" cy="214" r="5" fill="#667eea" opacity="0.8"/>
    <circle cx="180" cy="268" r="4" fill="#c084fc" opacity="0.6"/>
    <circle cx="332" cy="268" r="4" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="256" cy="172" r="5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="164" cy="320" r="3.5" fill="#667eea" opacity="0.5"/>
    <circle cx="348" cy="320" r="3.5" fill="#c084fc" opacity="0.5"/>
  </g>
  <!-- Sparkle accents -->
  <circle cx="148" cy="118" r="4" fill="#6ee7b7" opacity="0.5"/>
  <circle cx="364" cy="118" r="4" fill="#c084fc" opacity="0.5"/>
  <circle cx="128" cy="380" r="3" fill="#667eea" opacity="0.4"/>
  <circle cx="384" cy="380" r="3" fill="#6ee7b7" opacity="0.4"/>
  <!-- Small decorative dots -->
  <circle cx="240" cy="112" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="272" cy="112" r="2" fill="#6ee7b7" opacity="0.3"/>
</svg>
