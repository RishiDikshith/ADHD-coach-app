name: ADHD Executive Function Ecosystem CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-format:
    name: Code Quality (Linting & Formatting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Python Quality checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Verify Python Imports (isort)
        run: isort --check-only src/

      - name: Verify Python Code Style (black)
        run: black --check src/

      - name: Lint Python Codebase (flake8)
        run: flake8 src/

      # Node Quality checks
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install Frontend Tools
        run: |
          cd frontend-next
          npm ci

      - name: Verify Frontend Formatting (Prettier)
        run: |
          cd frontend-next
          npm run format:check

      - name: Lint Frontend Code (ESLint)
        run: |
          cd frontend-next
          npm run lint

  backend-test:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Audio & Build System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            espeak \
            portaudio19-dev \
            libasound2-dev \
            libasound2

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Pytest Suite with Coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          GROQ_API_KEY: "mock_groq_key_for_ci"
          PYTHONPATH: src
        run: |
          pytest --cov=src --cov-report=xml

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7

  frontend-test:
    name: Frontend Test & Type Check
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install Node Dependencies
        run: |
          cd frontend-next
          npm ci

      - name: TypeScript Static Compilation Check
        run: |
          cd frontend-next
          npx tsc --noEmit

      - name: Run Vitest Suite with Coverage
        run: |
          cd frontend-next
          npm run test -- --coverage

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-next/coverage/
          retention-days: 7

  docker-build:
    name: Dockerize & Compile Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend Docker caching & build
      - name: Cache Backend Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-backend
          key: ${{ runner.os }}-buildx-backend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-backend-

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: adhd-backend:latest
          cache-from: type=local,src=/tmp/.buildx-cache-backend
          cache-to: type=local,dest=/tmp/.buildx-cache-backend-new,mode=max

      # Frontend Docker caching & build
      - name: Cache Frontend Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-frontend
          key: ${{ runner.os }}-buildx-frontend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-frontend-

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: false
          tags: adhd-frontend:latest
          cache-from: type=local,src=/tmp/.buildx-cache-frontend
          cache-to: type=local,dest=/tmp/.buildx-cache-frontend-new,mode=max

      # Temp cache management to avoid cache bloat
      - name: Move Docker Build cache
        run: |
          rm -rf /tmp/.buildx-cache-backend /tmp/.buildx-cache-frontend
          mv /tmp/.buildx-cache-backend-new /tmp/.buildx-cache-backend || true
          mv /tmp/.buildx-cache-frontend-new /tmp/.buildx-cache-frontend || true

  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy Backend to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          echo "Deploying backend to Render..."
          curl -X GET "$RENDER_DEPLOY_HOOK"

      - name: Deploy Frontend to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        if: env.VERCEL_TOKEN != ''
        run: |
          echo "Deploying frontend to Vercel..."
          npx vercel --token "$VERCEL_TOKEN" --prod --yes
