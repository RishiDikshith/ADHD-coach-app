[client]
showErrorDetails = false
showWarningOnDirectExecution = false
toolbarMode = "minimal"
logger.level = "error"

[logger]
level = "error"

[server]
headless = true
enableXsrfProtection = true
enableCORS = false
maxUploadSize = 200
maxMessageSize = 200

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#1f2937"
