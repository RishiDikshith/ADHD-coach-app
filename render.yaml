services:
  - type: web
    name: adhd-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MAX_CONCURRENT_AI_REQUESTS
        value: "4"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /docs
    autoDeploy: true
